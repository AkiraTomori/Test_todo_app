name: Automated Tests (Unit & E2E)

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Backend Dependencies & Generate Prisma
      working-directory: ./backend
      run: |
        npm ci
        npx prisma generate

    - name: Install Testing Dependencies
      working-directory: ./testing
      run: npm ci

    - name: Run Unit Tests (Jest)
      working-directory: ./testing
      run: npx jest --coverage

    - name: Start services (Docker Compose)
      run: docker compose up -d --build

    - name: Wait for backend to be ready
      run: sleep 20

    - name: Install Playwright Browsers
      working-directory: ./testing
      run: npx playwright install --with-deps

    - name: Run Playwright E2E tests
      working-directory: ./testing
      run: npx playwright test

    - name: Upload Jest Coverage Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: jest-coverage
        path: testing/coverage/
        retention-days: 14

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: testing/playwright-report/
        retention-days: 14

  publish:
    name: Build & Push to GHCR
    needs: test
    runs-on: ubuntu-latest
    # if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Lowercase Repository Owner
      run: echo "REPO_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Backend Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ghcr.io/${{ env.REPO_OWNER }}/todo-backend:latest
          ghcr.io/${{ env.REPO_OWNER }}/todo-backend:${{ github.sha }}

    - name: Build and push Frontend Image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: |
          ghcr.io/${{ env.REPO_OWNER }}/todo-frontend:latest
          ghcr.io/${{ env.REPO_OWNER }}/todo-frontend:${{ github.sha }}
